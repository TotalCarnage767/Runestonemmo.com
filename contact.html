<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send a Raven — RunestoneMMO</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="contact-overlay">

  <!-- LARGE RAVEN IMAGE (banner-sized) -->
  <img src="/images/send-a-raven.png" 
       alt="Raven delivering a message" 
       class="raven-bg">

  <!-- OVERLAY PANEL ON RIGHT SIDE -->
  <div class="contact-panel">

    <h1>Send a Raven</h1>

    <p>
      Should you seek answers, guidance, or wish to deliver word to the Deep Halls,
      a raven stands ready. Inscribe your message below, and it shall take wing
      toward the Runestone Keep.
    </p>

    <form action="https://formspree.io/f/meelkpdq" method="POST" class="contact-form">

      <input type="hidden" name="_redirect" value="https://runestonemmo.com/success.html">

      <label>Your Name</label>
      <input type="text" name="name" required>

      <label>Your Email</label>
      <input type="email" name="email" required>

      <label>Your Message</label>
      <textarea name="message" rows="6" required></textarea>

      <button type="submit" class="button">Send the Raven</button>
    </form>

  </div>
</div>

<footer>
  <p>RunestoneMMO — Forged in the Deep Halls</p>
  <p>
    <a href="https://discord.gg/4ZAzaWGV" target="_blank">Guild Hall</a> •
    <a href="/contact.html">Send a Raven</a> •
    <a href="/terms.html">Terms & Licensing</a>
  </p>
</footer>

</body>
</html>
