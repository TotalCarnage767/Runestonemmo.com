<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in… — Runestone Vale</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    body { margin:0; background:#0d0b08; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:"Cinzel",serif; }
    .spinner { width:48px; height:48px; border:4px solid rgba(201,162,39,0.2); border-top-color:#c9a227; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .label { color:rgba(240,230,200,0.5); font-size:0.9rem; letter-spacing:1px; }
    .error-msg { color:#e57373; font-size:0.85rem; margin-top:16px; display:none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <script src="/auth.js"><\/script>
</head>
<body>
  <div style="text-align:center;">
    <div class="spinner"></div>
    <div class="label">Signing in with Discord…</div>
    <div class="error-msg" id="errMsg">Login failed. <a href="/index.html" style="color:#c9a227;">Return to Home</a></div>
  </div>
  <script>
    (async function() {
      try {
        await RSAuth.handleCallback();
      } catch (e) {
        document.getElementById("errMsg").style.display = "block";
        document.querySelector(".label").textContent = "Something went wrong.";
        console.error("Auth callback error:", e);
        setTimeout(function(){ window.location.href = "/index.html"; }, 3000);
      }
    })();
  <\/script>
</body>
</html>
